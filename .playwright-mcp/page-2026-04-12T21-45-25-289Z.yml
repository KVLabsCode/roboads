          - heading "Eye-level, not rooftop" [level=3] [ref=e41]
          - paragraph [ref=e42]: Robot screens sit at chest height, not up on a roof rack. Pedestrians actually look at them. We see 3x higher dwell time than taxi-top inventory.
        - article [ref=e43]:
          - img [ref=e44]
          - heading "Programmable placement" [level=3] [ref=e48]
          - paragraph [ref=e49]: Unlike a taxi that follows the driver, robots can be directed to a specific street corner or venue at a specific time. You bid on where, when, and who.
        - article [ref=e50]:
          - img [ref=e51]
          - heading "Tap to convert" [level=3] [ref=e56]
          - paragraph [ref=e57]: A haptic touch layer lets passers-by tap for coupons, QR codes, or product pages. That unlocks CPC and CPA pricing, not just CPM.
        - article [ref=e58]:
          - img [ref=e59]
          - heading "Verified impressions" [level=3] [ref=e62]
          - paragraph [ref=e63]: Onboard edge AI measures crowd density and dwell time locally. Every impression is verified by the device, not estimated from a panel.
        - article [ref=e64]:
          - img [ref=e65]
          - heading "One buy, all fleets" [level=3] [ref=e71]
          - paragraph [ref=e72]: A single campaign brief reaches delivery robots, humanoids, autonomous vehicles, and retail bots through one platform. One creative, every form factor.
        - article [ref=e73]:
          - img [ref=e74]
          - heading "Full attribution" [level=3] [ref=e81]
          - paragraph [ref=e82]: Impression to tap to purchase, tracked end to end. DSP-compatible reporting plugs into the rest of your stack.
