        - heading "Why robots outperform every other OOH format." [level=2] [ref=e32]
      - generic [ref=e33]:
        - article [ref=e34]:
          - img [ref=e35]
          - heading "Eye-level, not rooftop" [level=3] [ref=e38]
          - paragraph [ref=e39]: Robot screens sit at chest height, not up on a roof rack. Pedestrians actually look at them. We see 3x higher dwell time than taxi-top inventory.
        - article [ref=e40]:
          - img [ref=e41]
          - heading "Programmable placement" [level=3] [ref=e45]
          - paragraph [ref=e46]: Unlike a taxi that follows the driver, robots can be directed to a specific street corner or venue at a specific time. You bid on where, when, and who.
        - article [ref=e47]:
          - img [ref=e48]
          - heading "Tap to convert" [level=3] [ref=e53]
          - paragraph [ref=e54]: A haptic touch layer lets passers-by tap for coupons, QR codes, or product pages. That unlocks CPC and CPA pricing, not just CPM.
        - article [ref=e55]:
          - img [ref=e56]
          - heading "Verified impressions" [level=3] [ref=e59]
          - paragraph [ref=e60]: Onboard edge AI measures crowd density and dwell time locally. Every impression is verified by the device, not estimated from a panel.
        - article [ref=e61]:
          - img [ref=e62]
          - heading "One buy, all fleets" [level=3] [ref=e68]
          - paragraph [ref=e69]: A single campaign brief reaches delivery robots, humanoids, autonomous vehicles, and retail bots through one platform. One creative, every form factor.
        - article [ref=e70]:
          - img [ref=e71]
          - heading "Full attribution" [level=3] [ref=e78]
          - paragraph [ref=e79]: Impression to tap to purchase, tracked end to end. DSP-compatible reporting plugs into the rest of your stack.
